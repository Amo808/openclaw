services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    healthCheckPath: /health
    dockerCommand: "bash /app/start.sh"
    buildArgs:
      - key: OPENCLAW_DOCKER_APT_PACKAGES
        value: "python3 python3-venv python3-pip"
      - key: OPENCLAW_EXTENSIONS
        value: "metaclaw-openclaw"
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: KIMI_BOT_TOKEN
        sync: false
      - key: MOONSHOT_API_KEY
        sync: false
      - key: NODE_OPTIONS
        value: "--max-old-space-size=1536"
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
